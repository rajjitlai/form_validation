<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A premium form validation interface with Glassmorphism aesthetic.">
    <title>Premium Form Validation | Rajjit Laishram</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <!-- Font Awesome -->
    <script src="https://kit.fontawesome.com/fffa93f029.js" crossorigin="anonymous"></script>
</head>

<body>
    <main class="container">
        <header class="header">
            <h1>Create Account</h1>
            <p>Join our community today</p>
        </header>
        <form id="form" class="form">
            <div class="form-control">
                <label for="username">Username</label>
                <div class="input-container">
                    <input type="text" placeholder="Enter your username" id="username" autocomplete="off" />
                    <i class="fas fa-check-circle"></i>
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <small>Error message</small>
            </div>
            <div class="form-control">
                <label for="email">Email</label>
                <div class="input-container">
                    <input type="email" placeholder="example@mail.com" id="email" autocomplete="off" />
                    <i class="fas fa-check-circle"></i>
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <small>Error message</small>
            </div>
            <div class="form-control">
                <label for="password">Password</label>
                <div class="input-container">
                    <input type="password" placeholder="Min 8 characters" id="password" />
                    <i class="fas fa-check-circle"></i>
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <small>Error message</small>
            </div>
            <div class="form-control">
                <label for="password2">Confirm Password</label>
                <div class="input-container">
                    <input type="password" placeholder="Repeat your password" id="password2" />
                    <i class="fas fa-check-circle"></i>
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <small>Error message</small>
            </div>
            <button type="submit">Create Account</button>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
